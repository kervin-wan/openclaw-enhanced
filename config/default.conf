# ============================================================
# OpenClaw Enhanced — 默认配置
# 复制到 ~/.openclaw-enhanced/config/ 后按需修改
# ============================================================

# ── 核心设置 ─────────────────────────────────────────
# 增强版数据目录（默认 $HOME/.openclaw-enhanced）
# OPENCLAW_ENHANCED_HOME=

# Control UI 端口（默认 18790）
OPENCLAW_ENHANCED_PORT=18790

# ── 思考模式 ─────────────────────────────────────────
# auto   = 自动检测复杂度（推荐）
# manual = 强制深度思考所有请求
# off    = 关闭思考
ENHANCED_THINKING_MODE=auto

# 思考深度: low | medium | high
ENHANCED_THINKING_DEPTH=medium

# ── 运行时 ───────────────────────────────────────────
# 是否启用集成桥（默认 1）
ENHANCED_BRIDGE_ENABLED=1

# 功能门控（默认 1）
ENHANCED_FEATURE_GATING=1

# 模型质量追踪（默认 1）
ENHANCED_MODEL_QUALITY_TRACKING=1

# ── 日志级别 ─────────────────────────────────────────
# error | warn | info | debug
ENHANCED_LOG_LEVEL=info

# ── openclaw-cn 路径（自动检测失败时手动指定）──
# CLAWDBOT_CN_ENTRY=/usr/lib/node_modules/openclaw-cn/dist/entry.js