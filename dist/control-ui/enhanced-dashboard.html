<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>增强版功能面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: #555; }

    .status-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .status-card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .status-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .status-card .value { font-size: 20px; font-weight: 600; }
    .status-card .value.green { color: #2e7d32; }
    .status-card .value.red { color: #d32f2f; }
    .status-card .value.gray { color: #888; }

    .section {
      background: #fff;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .feature-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .feature-row:last-child { border-bottom: none; }
    .feature-name { font-size: 14px; font-weight: 500; }
    .feature-desc { font-size: 12px; color: #999; margin-top: 1px; }
    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge.on { background: #e8f5e9; color: #2e7d32; }
    .badge.off { background: #f5f5f5; color: #999; }

    .model-bar-wrap { margin: 6px 0 3px; }
    .model-bar {
      display: flex;
      height: 5px;
      border-radius: 3px;
      overflow: hidden;
    }
    .model-bar .ok { background: #4caf50; }
    .model-bar .fail { background: #f44336; }
    .model-row {
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .model-row:last-child { border-bottom: none; }
    .model-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .model-name { font-size: 13px; font-weight: 500; }
    .model-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .dot.green { background: #4caf50; }
    .dot.red { background: #f44336; }
    .dot.gray { background: #ccc; }
    .dot.orange { background: #ff9800; }

    .empty { color: #999; font-size: 13px; padding: 10px 0; }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .actions button {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: background 0.15s;
    }
    .actions button:hover { background: #f5f5f5; }
    .actions button.danger { color: #d32f2f; border-color: #ef9a9a; }
    .actions button.danger:hover { background: #fef0f0; }

    .footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 24px; }
    .refresh-indicator { font-size: 11px; color: #888; margin-left: auto; }

    #loading { text-align: center; padding: 60px 0; color: #888; }
    #error { text-align: center; padding: 40px 0; color: #d32f2f; display: none; }
  </style>
</head>
<body>
  <h1>⚙️ 增强版功能面板</h1>

  <div id="loading">加载中...</div>
  <div id="error">❌ 无法连接增强版服务</div>
  <div id="content" style="display:none">
    <!-- Status cards -->
    <div class="status-bar" id="status-bar"></div>

    <!-- Features -->
    <h2>🔧 功能开关</h2>
    <div class="section" id="features-section"></div>

    <!-- Model quality -->
    <h2>📊 模型质量</h2>
    <div class="section" id="models-section"></div>

    <!-- Actions -->
    <div class="actions">
      <button onclick="refresh()">🔄 刷新</button>
      <button class="danger" onclick="hotReload()">♻️ 热重载</button>
      <span class="refresh-indicator" id="refresh-time"></span>
    </div>

    <div class="footer">OpenClaw Enhanced &middot; 数据每 30 秒自动刷新</div>
  </div>

  <script>
    'use strict';

    let timer = null;

    function hotReload() {
      if (!confirm('热重载将重置所有模块状态（hook 错误计数、模型评分等），无需重启进程。确定？')) return;
      fetch('/enhanced/reload', { method: 'POST' })
        .then(r => r.json().then(j => ({ ok: r.ok, body: j }), () => ({ ok: false })))
        .then(({ ok, body }) => {
          alert(body?.ok ? '✅ 热重载完成。等待几秒后刷新...' : '❌ 热重载失败: ' + (body?.error || ''));
          setTimeout(refresh, 3000);
        })
        .catch(() => alert('❌ 热重载请求失败'));
    }

    function refresh() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      loadData();
    }

    function loadData() {
      fetch('/enhanced/status')
        .then(r => r.json())
        .then(data => render(data))
        .catch(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        });
    }

    function render(data) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      const m = data.modules || {};
      const init = data.initialized;

      // Status cards
      const sb = document.getElementById('status-bar');
      sb.innerHTML = `
        <div class="status-card">
          <div class="label">系统状态</div>
          <div class="value ${init ? 'green' : 'red'}">${init ? '✅ 已初始化' : '❌ 未初始化'}</div>
        </div>
        <div class="status-card">
          <div class="label">Hook 错误</div>
          <div class="value ${(m.hooks?.count ?? 0) > 0 ? 'red' : 'green'}">${m.hooks?.count ?? 0} 次</div>
        </div>
        <div class="status-card">
          <div class="label">模型总请求</div>
          <div class="value gray">${m.model_quality?.totalRequests || 0}</div>
        </div>
        <div class="status-card">
          <div class="label">功能模块</div>
          <div class="value green">${m.featureGate?.features || 0} 个</div>
        </div>
      `;

      // Features
      const fs = document.getElementById('features-section');
      const featureList = m.featureGate?.list;
      if (featureList) {
        let html = '';
        for (const [name, info] of Object.entries(featureList)) {
          html += `
            <div class="feature-row">
              <div>
                <div class="feature-name">${name.replace(/_/g, ' ')}</div>
                <div class="feature-desc">${info.description || ''}</div>
              </div>
              <span class="badge ${info.enabled ? 'on' : 'off'}">${info.enabled ? 'ON' : 'OFF'}</span>
            </div>`;
        }
        fs.innerHTML = html;
      } else {
        fs.innerHTML = '<div class="empty">暂无数据</div>';
      }

      // Model quality
      const ms = document.getElementById('models-section');
      const mq = m.model_quality;
      if (mq && mq.models && mq.models.length > 0) {
        let html = '';
        for (const model of mq.models) {
          const sr = parseFloat(model.successRate);
          const fr = 100 - sr;
          const dotClass = sr >= 90 ? 'green' : sr >= 50 ? 'orange' : 'red';
          html += `
            <div class="model-row">
              <div class="model-top">
                <span class="model-name"><span class="dot ${dotClass}"></span>${model.key}</span>
                <span style="font-weight:600;font-size:14px">${model.successRate}%</span>
              </div>
              <div class="model-bar-wrap">
                <div class="model-bar">
                  <div class="ok" style="width:${sr}%"></div>
                  <div class="fail" style="width:${fr}%"></div>
                </div>
              </div>
              <div class="model-meta">
                总计 ${model.total} 次 &middot; 失败 ${model.failure} 次 &middot; 截断 ${model.truncationRate}%
                ${model.lastError ? ' &middot; 最后错误: ' + String(model.lastError).slice(0, 40) : ''}
              </div>
            </div>`;
        }
        ms.innerHTML = html;
      } else {
        ms.innerHTML = '<div class="empty">暂无模型调用记录</div>';
      }

      // Refresh time
      document.getElementById('refresh-time').textContent = '上次刷新: ' + new Date().toLocaleTimeString();
    }

    // Start
    loadData();
    timer = setInterval(loadData, 30000);
  </script>
</body>
</html>
